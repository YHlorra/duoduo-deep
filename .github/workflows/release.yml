name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0). Leave empty to skip tag validation.'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build APK & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See android/key.properties.example for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          ls -l android/app/release.keystore

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        id: build
        run: |
          flutter build apk --release
          APK="build/app/outputs/flutter-apk/app-release.apk"
          SIZE=$(du -h "$APK" | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 下载

            - `app-release.apk` (${{ steps.build.outputs.size }}) — Android 通用包

            ## 元信息

            | 项 | 值 |
            |----|----|
            | Flutter | 3.44.4-stable |
            | Dart | 3.12.2 |
            | Commit | `${{ github.sha }}` |
            | 触发 | tag `${{ github.ref_name }}` |

            ## 注意事项

            - 本 APK 使用项目维护者持有的 **release key 签名**，可 sideload 装设备使用。
            - 上架 Google Play Store 时，需用 Play Console 接受的签名密钥重新签名（见 Play App Signing 流程）。
