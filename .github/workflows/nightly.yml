name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    name: Build Nightly APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Delete old nightly tag (if any)
        run: git push origin :refs/tags/nightly 2>/dev/null || true

      - name: Move nightly tag to current commit
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Delete old nightly release
        run: gh release delete nightly --yes --repo YHlorra/duoduo-deep 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 夜间构建

            每次 push 到 `main` 自动更新。只保留最新一份。

            | 项 | 值 |
            |----|----|
            | Commit | `${{ github.sha }}` |
            | 消息 | ${{ github.event.head_commit.message }} |
            | Flutter | 3.44.4-stable |
            | Dart | 3.12.2 |

            > 正式发布见 [Releases](https://github.com/YHlorra/duoduo-deep/releases) 中的版本号（v0.x.x）条目。
